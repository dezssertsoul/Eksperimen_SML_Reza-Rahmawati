name: Preprocessing Pipeline

on:
  push:
    paths:
      - 'Midterm_53_group_raw/**'
      - 'preprocessing/automate_Reza-Rahmawati.py'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn

      - name: Run preprocessing script
        run: |
          python preprocessing/automate_Reza-Rahmawati.py \
            --input Midterm_53_group_raw/Midterm_53_group.csv \
            --output_dir preprocessing/processed

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add preprocessing/processed/
          git diff --staged --quiet || git commit -m "Auto-update: preprocessing done"
          git push
